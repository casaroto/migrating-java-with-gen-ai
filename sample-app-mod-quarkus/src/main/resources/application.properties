# ModResorts on Quarkus
quarkus.http.port=8080

# Serve the static SPA (index.html) from the web root.
# Static assets live under src/main/resources/META-INF/resources.
quarkus.http.enable-compression=true

# Keep the legacy java.util.logging output readable
quarkus.log.console.enable=true
quarkus.log.level=INFO
